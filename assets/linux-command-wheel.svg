<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
<style>
  @keyframes rotateCW { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rotateCCW { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
  .ring-outer { animation: rotateCW 60s linear infinite; transform-origin: 400px 400px; }
  .ring-inner { animation: rotateCCW 50s linear infinite; transform-origin: 400px 400px; }
  .cmd { font-family: "Courier New", Courier, monospace; font-size: 20px; fill: #58a6ff; font-weight: bold; cursor: pointer; transition: all 0.3s ease; text-anchor: middle; alignment-baseline: middle; }
  .cmd:hover { fill: #39ff14; filter: drop-shadow(0 0 8px #39ff14); font-size: 24px; }
  .cmd-inner { fill: #c9d1d9; }
  .cmd-inner:hover { fill: #00ffff; filter: drop-shadow(0 0 8px #00ffff); }
  .center-bg { fill: rgba(13, 17, 23, 0.85); stroke: #39ff14; stroke-width: 2; filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.4)); }
  .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: bold; text-anchor: middle; alignment-baseline: middle; }
  .title-linux { font-size: 32px; fill: #39ff14; }
  .title-sub { font-size: 16px; fill: #c9d1d9; letter-spacing: 2px; }
  .title-cloud { font-size: 15px; fill: #58a6ff; letter-spacing: 3px; }
  .bg { fill: #0d1117; }
</style>
<rect width="800" height="800" class="bg" rx="20"/>

<!-- Subtle grid or accents for glassmorphism / devops vibe -->
<circle cx="400" cy="400" r="320" fill="none" stroke="#1f6feb" stroke-width="1" stroke-dasharray="4 8" opacity="0.3" />
<circle cx="400" cy="400" r="220" fill="none" stroke="#39ff14" stroke-width="1" stroke-dasharray="4 8" opacity="0.3" />

<g class="ring-outer">
  <text x="720.0" y="400.0" class="cmd" transform="rotate(0.0, 720.0, 400.0)">ls</text>
  <text x="683.3" y="548.7" class="cmd" transform="rotate(27.7, 683.3, 548.7)">cd</text>
  <text x="581.8" y="663.4" class="cmd" transform="rotate(55.4, 581.8, 663.4)">pwd</text>
  <text x="438.6" y="717.7" class="cmd" transform="rotate(83.1, 438.6, 717.7)">grep</text>
  <text x="286.5" y="699.2" class="cmd" transform="rotate(290.8, 286.5, 699.2)">find</text>
  <text x="160.5" y="612.2" class="cmd" transform="rotate(318.5, 160.5, 612.2)">tail -f</text>
  <text x="89.3" y="476.6" class="cmd" transform="rotate(346.2, 89.3, 476.6)">awk</text>
  <text x="89.3" y="323.4" class="cmd" transform="rotate(373.8, 89.3, 323.4)">sed</text>
  <text x="160.5" y="187.8" class="cmd" transform="rotate(401.5, 160.5, 187.8)">ps</text>
  <text x="286.5" y="100.8" class="cmd" transform="rotate(429.2, 286.5, 100.8)">top</text>
  <text x="438.6" y="82.3" class="cmd" transform="rotate(276.9, 438.6, 82.3)">df -h</text>
  <text x="581.8" y="136.6" class="cmd" transform="rotate(304.6, 581.8, 136.6)">du -sh</text>
  <text x="683.3" y="251.3" class="cmd" transform="rotate(332.3, 683.3, 251.3)">free -h</text>
</g>

<g class="ring-inner">
  <text x="620.0" y="400.0" class="cmd cmd-inner" transform="rotate(0.0, 620.0, 400.0)">systemctl</text>
  <text x="594.8" y="502.2" class="cmd cmd-inner" transform="rotate(27.7, 594.8, 502.2)">journalctl</text>
  <text x="525.0" y="581.1" class="cmd cmd-inner" transform="rotate(55.4, 525.0, 581.1)">curl</text>
  <text x="426.5" y="618.4" class="cmd cmd-inner" transform="rotate(83.1, 426.5, 618.4)">ss</text>
  <text x="322.0" y="605.7" class="cmd cmd-inner" transform="rotate(290.8, 322.0, 605.7)">ssh</text>
  <text x="235.3" y="545.9" class="cmd cmd-inner" transform="rotate(318.5, 235.3, 545.9)">scp</text>
  <text x="186.4" y="452.6" class="cmd cmd-inner" transform="rotate(346.2, 186.4, 452.6)">rsync</text>
  <text x="186.4" y="347.4" class="cmd cmd-inner" transform="rotate(373.8, 186.4, 347.4)">chmod</text>
  <text x="235.3" y="254.1" class="cmd cmd-inner" transform="rotate(401.5, 235.3, 254.1)">chown</text>
  <text x="322.0" y="194.3" class="cmd cmd-inner" transform="rotate(429.2, 322.0, 194.3)">tar</text>
  <text x="426.5" y="181.6" class="cmd cmd-inner" transform="rotate(276.9, 426.5, 181.6)">git</text>
  <text x="525.0" y="218.9" class="cmd cmd-inner" transform="rotate(304.6, 525.0, 218.9)">docker</text>
  <text x="594.8" y="297.8" class="cmd cmd-inner" transform="rotate(332.3, 594.8, 297.8)">kubectl</text>
</g>

<!-- Center -->
<circle cx="400" cy="400" r="110" class="center-bg" />
<text x="400" y="360" class="title title-linux">🐧 LINUX</text>
<text x="400" y="400" class="title title-sub">REAL-TIME PROJECTS</text>
<text x="400" y="440" class="title title-cloud">CLOUD • DEVOPS</text>
</svg>
